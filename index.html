<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simga's RNG</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap');

        :root {
            --bg-color: #0d0d12;
            --panel-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #888899;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: radial-gradient(circle at center, #1a1a24 0%, #0d0d12 100%);
            transition: filter 0.2s, transform 0.1s;
        }

        /* --- Animations & Effects --- */
        @keyframes shake {
            0%, 100% { transform: translate(0, 0) rotate(0); }
            25% { transform: translate(-5px, 5px) rotate(-1deg); }
            50% { transform: translate(5px, -5px) rotate(1deg); }
            75% { transform: translate(-5px, -5px) rotate(0deg); }
        }

        @keyframes heavyShake {
            0%, 100% { transform: translate(0, 0) scale(1); }
            10% { transform: translate(-15px, 15px) scale(1.02); }
            20% { transform: translate(15px, -15px) scale(0.98); }
            30% { transform: translate(-15px, -15px) scale(1.05); }
            40% { transform: translate(15px, 15px) scale(0.95); }
            50% { transform: translate(-10px, 10px) scale(1.01); }
        }

        @keyframes flash {
            0% { filter: brightness(1); }
            50% { filter: brightness(3) contrast(1.5); }
            100% { filter: brightness(1); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .shake-active { animation: shake 0.4s ease-in-out; }
        .heavy-shake-active { animation: heavyShake 0.6s cubic-bezier(.36,.07,.19,.97) both; }
        .flash-active { animation: flash 0.5s ease-out; }

        /* --- Particles --- */
        .particle {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            z-index: 100;
        }

        /* --- Layout --- */
        header {
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid var(--border-color);
            z-index: 10;
        }

        .stats-top {
            display: flex;
            gap: 2rem;
        }

        .stat-box {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 1.2rem; font-weight: bold; }

        main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* --- Left: Roll Area --- */
        #roll-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            position: relative;
        }

        #roll-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 3rem;
            min-height: 350px;
            justify-content: center;
        }

        #rolled-image {
            width: 200px;
            height: 200px;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.1));
            transition: all 0.3s;
        }

        #rolled-name {
            font-size: 3rem;
            font-weight: 900;
            margin-top: 1rem;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #rolled-odds {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
        }

        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            width: 100%;
            max-width: 400px;
        }

        button.btn-roll {
            background: var(--accent);
            color: white;
            border: none;
            padding: 1.2rem 3rem;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 2px;
            width: 100%;
        }

        button.btn-roll:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(99, 102, 241, 0.5);
        }

        button.btn-roll:active {
            transform: translateY(2px);
        }

        .toggles {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .toggle-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            font-size: 1rem;
            color: var(--text-muted);
            transition: color 0.2s;
        }
        .toggle-label:hover { color: white; }

        .btn-upgrade {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-upgrade:hover {
            background: rgba(255,255,255,0.1);
        }

        /* --- Right: Inventory Area --- */
        #inventory-section {
            width: 450px;
            background: rgba(0,0,0,0.4);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .inv-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .progress-bar-bg {
            width: 100%;
            height: 10px;
            background: var(--panel-bg);
            border-radius: 5px;
            margin-top: 0.5rem;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.5s ease-out;
        }

        .inv-grid {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 1rem;
            align-content: start;
        }

        /* Scrollbar styles */
        .inv-grid::-webkit-scrollbar { width: 8px; }
        .inv-grid::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        .inv-grid::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

        .inv-item {
            aspect-ratio: 1;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .inv-item:hover { transform: scale(1.05); z-index: 2; }

        .inv-item img {
            width: 50%;
            height: 50%;
            object-fit: contain;
        }

        .inv-item.locked {
            filter: grayscale(100%) opacity(0.3);
        }

        .inv-item.locked img { display: none; }

        .inv-item.locked::after {
            content: '???';
            font-size: 1.5rem;
            font-weight: bold;
        }

        .item-count {
            position: absolute;
            bottom: -5px;
            right: -5px;
            background: var(--accent);
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: bold;
        }

        /* --- Announcements --- */
        #global-announcement {
            position: absolute;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            border: 2px solid;
            padding: 1rem 3rem;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            z-index: 1000;
            transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
            text-align: center;
            white-space: nowrap;
        }

        #global-announcement.show { top: 20px; }

        /* --- Responsive --- */
        @media (max-width: 900px) {
            main { flex-direction: column; }
            #inventory-section { width: 100%; border-left: none; border-top: 1px solid var(--border-color); flex: 1; }
            #roll-section { padding: 1rem; flex: none; height: 50vh; }
            #roll-display { min-height: 250px; margin-bottom: 1rem; }
            #rolled-image { width: 120px; height: 120px; }
            #rolled-name { font-size: 2rem; }
        }

        /* --- Dynamic Effect Classes --- */
        /* Effect 1: Normal */
        .efx-1 { text-shadow: none; }
        /* Effect 2: Mild Glow */
        .efx-2 { text-shadow: 0 0 10px currentColor; }
        /* Effect 3: Strong Glow & Float */
        .efx-3 { text-shadow: 0 0 20px currentColor, 0 0 40px currentColor; animation: float 3s ease-in-out infinite; }
        /* Effect 4: Massive Glow, Shimmer */
        .efx-4 { 
            text-shadow: 0 0 10px #fff, 0 0 30px currentColor, 0 0 50px currentColor; 
            animation: float 2s ease-in-out infinite; 
        }
        /* Effect 5: Glitch/God Tier */
        .efx-5 {
            background-image: linear-gradient(90deg, #fff, currentColor, #fff, currentColor);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            color: transparent;
            animation: gradientShift 2s linear infinite, float 1.5s ease-in-out infinite;
            text-shadow: 0 0 50px currentColor;
        }

        /* Tooltip */
        .tooltip {
            position: absolute;
            background: rgba(0,0,0,0.9);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 5px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 500;
            font-size: 0.9rem;
            white-space: nowrap;
        }

        /* --- Modal (Inspect) --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            padding: 3rem;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            min-width: 350px;
        }
        .modal-overlay.active .modal-content {
            transform: scale(1);
        }
        .modal-close {
            position: absolute;
            top: 15px; right: 20px;
            background: none; border: none;
            color: white; font-size: 2rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        .modal-close:hover { color: var(--accent); }
        #inspect-image {
            width: 250px; height: 250px;
            object-fit: contain;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 30px rgba(255,255,255,0.1));
        }
        #inspect-name { font-size: 2.5rem; text-transform: uppercase; font-weight: 900; letter-spacing: 2px; }
        .inspect-detail { color: var(--text-muted); font-size: 1.1rem; margin-top: 0.5rem; }

        /* --- Settings Menu Styles --- */
        .settings-section {
            width: 100%;
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .settings-section label {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .settings-section input {
            flex: 1;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border-color);
            color: white;
            padding: 0.8rem;
            border-radius: 8px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }
        .settings-section input:focus {
            border-color: var(--accent);
        }
        .btn-settings-icon {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s, transform 0.2s;
        }
        .btn-settings-icon:hover {
            color: white;
            transform: rotate(45deg);
        }
    </style>
</head>
<body>

    <header>
        <h2>🎲 Absolute RNG</h2>
        <div class="stats-top">
            <div class="stat-box">
                <span class="stat-label">Total Rolls</span>
                <span class="stat-value" id="stat-total-rolls">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Points</span>
                <span class="stat-value" id="stat-points" style="color: #ffd700;">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Luck Multiplier</span>
                <span class="stat-value" id="stat-luck">1.0x</span>
            </div>
        </div>
        <div style="display: flex; align-items: center; gap: 1rem;">
            <span id="display-player-name" style="font-weight: bold; color: var(--accent);"></span>
            <button id="btn-settings" class="btn-settings-icon">⚙️</button>
        </div>
    </header>

    <main>
        <div id="roll-section">
            <div id="roll-display">
                <img id="rolled-image" src="" alt="" style="display: none;">
                <div id="rolled-name">Click Roll to Start</div>
                <div id="rolled-odds"></div>
            </div>

            <div class="controls">
                <button class="btn-roll" id="btn-roll">Roll</button>
                <div class="toggles">
                    <label class="toggle-label">
                        <input type="checkbox" id="toggle-auto"> Auto-Roll (1s)
                    </label>
                    <button class="btn-upgrade" id="btn-upgrade">Upgrade Luck (Cost: 100)</button>
                </div>
                <div style="font-size: 0.8rem; color: var(--text-muted); margin-top: 10px;">
                    Pity Status: <span id="pity-counter">0</span> / 100
                </div>
            </div>
        </div>

        <div id="inventory-section">
            <div class="inv-header">
                <h3>Collection</h3>
                <div style="display: flex; justify-content: space-between; margin-top: 0.5rem; font-size: 0.9rem; color: var(--text-muted);">
                    <span>Progress: <span id="progress-text">0/30</span></span>
                    <span>Highest: <span id="highest-text">None</span></span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progress-bar"></div>
                </div>
            </div>
            <div class="inv-grid" id="inventory-grid">
                <!-- Items populated by JS -->
            </div>
        </div>
    </main>

    <div id="global-announcement"></div>
    <div id="tooltip" class="tooltip"></div>

    <div id="inspect-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close" id="btn-close-modal">&times;</button>
            <img id="inspect-image" src="" alt="">
            <div id="inspect-name">???</div>
            <div class="inspect-detail" id="inspect-odds"></div>
            <div class="inspect-detail" id="inspect-owned"></div>
            <div class="inspect-detail" id="inspect-value"></div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal-overlay">
        <div class="modal-content" style="width: 400px; align-items: flex-start;">
            <button class="modal-close" id="btn-close-settings">&times;</button>
            <h2 style="margin-bottom: 1.5rem; width: 100%; text-align: center;">⚙️ Settings</h2>
            
            <div class="settings-section">
                <label>Player Name</label>
                <div style="display: flex; gap: 0.5rem; width: 100%;">
                    <input type="text" id="input-name" maxlength="16" placeholder="Enter new name">
                    <button id="btn-save-name" class="btn-upgrade">Save</button>
                </div>
            </div>

            <div class="settings-section">
                <label>Redeem Code</label>
                <div style="display: flex; gap: 0.5rem; width: 100%;">
                    <input type="text" id="input-code" placeholder="Enter code">
                    <button id="btn-redeem" class="btn-upgrade">Redeem</button>
                </div>
                <div id="code-message" style="font-size: 0.85rem; margin-top: 0.2rem;"></div>
            </div>

            <div class="settings-section" style="margin-top: 1rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
                <button id="btn-reset-progress" style="width: 100%; background: #dc3545; color: white; border: none; padding: 1rem; border-radius: 8px; cursor: pointer; font-weight: bold; font-family: inherit;">Reset Progress</button>
                <div id="reset-confirm-area" style="display: none; flex-direction: column; gap: 0.5rem;">
                    <span style="color: #ff6b6b; font-size: 0.9rem; text-align: center;">Are you sure? This deletes everything except your name!</span>
                    <div style="display: flex; gap: 0.5rem;">
                        <button id="btn-confirm-reset" style="flex: 1; background: #dc3545; color: white; border: none; padding: 0.8rem; border-radius: 4px; cursor: pointer; font-weight: bold;">Yes, Delete</button>
                        <button id="btn-cancel-reset" style="flex: 1; background: var(--panel-bg); color: white; border: 1px solid var(--border-color); padding: 0.8rem; border-radius: 4px; cursor: pointer;">Cancel</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Core Data: 30 Rarities with exponential odds ---
        const rarities = [
            { id: 1, name: "Common", odds: 2, color: "#A0A0A0", effect: 1, val: 1 },
            { id: 2, name: "Uncommon", odds: 4, color: "#4CAF50", effect: 1, val: 2 },
            { id: 3, name: "Ordinary", odds: 6, color: "#8BC34A", effect: 1, val: 3 },
            { id: 4, name: "Standard", odds: 8, color: "#009688", effect: 1, val: 4 },
            { id: 5, name: "Refined", odds: 10, color: "#00BCD4", effect: 1, val: 5 },
            { id: 6, name: "Rare", odds: 15, color: "#2196F3", effect: 2, val: 10 },
            { id: 7, name: "Superior", odds: 25, color: "#3F51B5", effect: 2, val: 15 },
            { id: 8, name: "Elite", odds: 35, color: "#9C27B0", effect: 2, val: 20 },
            { id: 9, name: "Epic", odds: 50, color: "#673AB7", effect: 2, val: 35 },
            { id: 10, name: "Masterwork", odds: 100, color: "#E91E63", effect: 2, val: 75 },
            { id: 11, name: "Legendary", odds: 250, color: "#FF9800", effect: 3, val: 200 },
            { id: 12, name: "Mythic", odds: 1000, color: "#FF5722", effect: 3, val: 800 },
            { id: 13, name: "Ancient", odds: 2500, color: "#F44336", effect: 3, val: 2000 },
            { id: 14, name: "Arcane", odds: 5000, color: "#DC143C", effect: 3, val: 4000 },
            { id: 15, name: "Exalted", odds: 7500, color: "#FFD700", effect: 3, val: 6000 },
            { id: 16, name: "Transcendent", odds: 10000, color: "#FFFFE0", effect: 3, val: 8000 },
            { id: 17, name: "Divine", odds: 25000, color: "#FFFFFF", effect: 4, val: 20000 },
            { id: 18, name: "Celestial", odds: 100000, color: "#87CEEB", effect: 4, val: 80000 },
            { id: 19, name: "Ethereal", odds: 250000, color: "#E6E6FA", effect: 4, val: 200000 },
            { id: 20, name: "Ascended", odds: 500000, color: "#98FF98", effect: 4, val: 400000 },
            { id: 21, name: "Godlike", odds: 1000000, color: "#FF00FF", effect: 4, val: 800000 },
            { id: 22, name: "Primordial", odds: 2500000, color: "#39FF14", effect: 4, val: 2000000 },
            { id: 23, name: "Omniscient", odds: 5000000, color: "#7DF9FF", effect: 4, val: 4000000 },
            { id: 24, name: "Eternal", odds: 10000000, color: "#FFDAB9", effect: 4, val: 8000000 },
            { id: 25, name: "Infinity", odds: 25000000, color: "#C0C0C0", effect: 4, val: 20000000 },
            { id: 26, name: "Voidborn", odds: 50000000, color: "#9D00FF", effect: 5, val: 40000000 },
            { id: 27, name: "Cosmic Sovereign", odds: 100000000, color: "#4169E1", effect: 5, val: 80000000 },
            { id: 28, name: "Reality Shaper", odds: 250000000, color: "#E0115F", effect: 5, val: 200000000 },
            { id: 29, name: "Timeless Paragon", odds: 500000000, color: "#B9F2FF", effect: 5, val: 400000000 },
            { id: 30, name: "Absolute", odds: 1000000000, color: "#FF0000", effect: 5, val: 1000000000 }
        ];

        // --- Game State ---
        let state = {
            inventory: {}, 
            rolls: 0,
            points: 0,
            luckLevel: 1,
            luck: 1,
            pity: 0,
            playerName: null,
            redeemedCodes: []
        };

        const validCodes = {
            'RELEASE': 1000,
            'SIMGAGOGO69': 10000
        };

        let autoRollInterval = null;
        let isRolling = false;

        // --- Utility Functions ---
        const formatNumber = (num) => new Intl.NumberFormat().format(num);
        
        const getUpgradeCost = () => Math.floor(100 * Math.pow(3, state.luckLevel - 1));

        const getFilename = (name) => name.toLowerCase().replace(/ /g, '_');

        // SVG Placeholder generator for missing images
        const getPlaceholderSVG = (color, initial) => {
            const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
                <rect width="100" height="100" fill="#1a1a24" rx="15" stroke="${color}" stroke-width="4"/>
                <text x="50%" y="50%" dominant-baseline="central" text-anchor="middle" fill="${color}" font-size="50" font-family="sans-serif" font-weight="bold">${initial}</text>
            </svg>`;
            return `data:image/svg+xml;base64,${btoa(svg)}`;
        };

        // --- Core Mechanics ---
        function calculateRNG() {
            // Pity increases chances. Max pity = huge boost.
            const pityMulti = state.pity >= 100 ? 50 : (1 + (state.pity * 0.02));
            const currentLuck = state.luck * pityMulti;

            let roll = Math.random();

            // Check from Rarest to Common
            for (let i = rarities.length - 1; i >= 0; i--) {
                const r = rarities[i];
                const chance = (1 / r.odds) * currentLuck;
                if (roll <= chance) {
                    return r;
                }
            }
            return rarities[0];
        }

        function triggerRoll() {
            if (isRolling) return;
            
            // UI setup for roll animation
            const imgEl = document.getElementById('rolled-image');
            const nameEl = document.getElementById('rolled-name');
            imgEl.style.animation = 'none';
            nameEl.style.animation = 'none';
            void imgEl.offsetWidth; // Trigger reflow
            
            state.rolls++;
            const result = calculateRNG();

            // Pity system logic: Dynamic based on best tier
            // To ensure early game still has pity, we set a base threshold of Tier 7 (so Tier 8+ resets pity initially)
            const highestId = Math.max(0, ...Object.keys(state.inventory).map(Number));
            const badRollThreshold = Math.max(highestId - 5, 7); 

            if (result.id <= badRollThreshold) {
                state.pity++;
            } else {
                state.pity = 0;
            }

            // Update Economy/Inventory
            state.points += result.val;
            state.inventory[result.id] = (state.inventory[result.id] || 0) + 1;
            
            saveData();
            updateUI(result);
            triggerEffects(result);
            
            // Reset animations
            imgEl.style.animation = 'popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            nameEl.style.animation = 'popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.1s both';
        }

        // --- Visual Effects ---
        function triggerEffects(rarity) {
            const body = document.body;
            body.className = ''; // reset classes
            
            if (rarity.effect >= 3) {
                body.classList.add('shake-active');
            }
            if (rarity.effect >= 4) {
                setTimeout(() => body.classList.add('flash-active'), 50);
                spawnParticles(rarity.color, 30);
            }
            if (rarity.effect >= 5) {
                body.classList.remove('shake-active');
                body.classList.add('heavy-shake-active');
                spawnParticles(rarity.color, 100);
                showAnnouncement(`YOU ROLLED ${rarity.name.toUpperCase()}!`, rarity.color);
            }

            setTimeout(() => {
                body.className = '';
            }, 1000);
        }

        function spawnParticles(color, count) {
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.backgroundColor = color;
                
                // Random size 5-15px
                const size = Math.random() * 10 + 5;
                p.style.width = `${size}px`;
                p.style.height = `${size}px`;

                // Start center
                p.style.left = '50%';
                p.style.top = '50%';
                
                document.body.appendChild(p);

                // Random target position
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 500 + 100;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;

                p.animate([
                    { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(0)`, opacity: 0 }
                ], {
                    duration: 800 + Math.random() * 600,
                    easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'
                }).onfinish = () => p.remove();
            }
        }

        function showAnnouncement(text, color) {
            const banner = document.getElementById('global-announcement');
            banner.textContent = text;
            banner.style.borderColor = color;
            banner.style.color = color;
            banner.style.boxShadow = `0 0 20px ${color}`;
            
            banner.classList.add('show');
            setTimeout(() => banner.classList.remove('show'), 4000);
        }

              setInterval(() => {
            if (Math.random() < 0.3) {
                const fakeUsers = ["Guest_1902", "Guest_2321", "Guest_1850", "Guest_1284", "ShadowNinja", "ShadowNigga", "RNG_God", "NoobSlayer99", "LuckyDuck", "LuckyFuck", "bumcracker67", "naperiggerson", "EFN", "diddysbumhole", "wemby'slittletwink", "avi'spersonalsweatlicker", "i_drink_akshita's_pee", "i_eat akshita's_poop"];
                const targetRarity = rarities[Math.floor(Math.random() * 10) + 20]; // Tiers 20-30
                const user = fakeUsers[Math.floor(Math.random() * fakeUsers.length)];
                showAnnouncement(`[Global] ${user} rolled ${targetRarity.name}!`, targetRarity.color);
            }
        }, Math.random() * 30000);

        // --- UI Updates ---
        function updateUI(result) {
            // Update Top Stats
            document.getElementById('display-player-name').textContent = state.playerName;
            document.getElementById('stat-total-rolls').textContent = formatNumber(state.rolls);
            document.getElementById('stat-points').textContent = formatNumber(state.points);
            document.getElementById('stat-luck').textContent = state.luck.toFixed(1) + 'x';
            document.getElementById('pity-counter').textContent = state.pity;

            // Update Roll Display if a result exists
            if (result) {
                const img = document.getElementById('rolled-image');
                img.style.display = 'block';
                const filename = getFilename(result.name);
                img.src = `images/${filename}.png`;
                img.onerror = () => { img.src = getPlaceholderSVG(result.color, result.name[0]); };
                
                const nameEl = document.getElementById('rolled-name');
                nameEl.textContent = result.name;
                nameEl.style.color = result.color;
                
                // Apply visual effect class
                nameEl.className = `efx-${result.effect}`;
                
                document.getElementById('rolled-odds').textContent = `1 in ${formatNumber(result.odds)}`;
            }

            // Update Upgrade Button
            const cost = getUpgradeCost();
            const btnUp = document.getElementById('btn-upgrade');
            btnUp.textContent = `Upgrade Luck (Cost: ${formatNumber(cost)})`;
            btnUp.style.opacity = state.points >= cost ? '1' : '0.5';

            buildInventory();
        }

        function buildInventory() {
            const grid = document.getElementById('inventory-grid');
            grid.innerHTML = '';
            
            let unlockedCount = 0;
            let highestId = 0;

            rarities.forEach(r => {
                const count = state.inventory[r.id] || 0;
                const isUnlocked = count > 0;
                
                if (isUnlocked) {
                    unlockedCount++;
                    if (r.id > highestId) highestId = r.id;
                }

                const el = document.createElement('div');
                el.className = `inv-item ${isUnlocked ? '' : 'locked'}`;
                
                if (isUnlocked) {
                    el.style.borderColor = r.color;
                    el.style.boxShadow = `inset 0 0 10px rgba(${hexToRgb(r.color)}, 0.2)`;
                    
                    const img = document.createElement('img');
                    img.src = `images/${getFilename(r.name)}.png`;
                    img.onerror = () => { img.src = getPlaceholderSVG(r.color, r.name[0]); };
                    el.appendChild(img);

                    const badge = document.createElement('div');
                    badge.className = 'item-count';
                    badge.textContent = count > 999 ? '999+' : count;
                    el.appendChild(badge);
                    
                    // Tooltip logic
                    el.onmouseenter = (e) => showTooltip(e, r, count);
                    el.onmousemove = moveTooltip;
                    el.onmouseleave = hideTooltip;

                    // Inspect logic
                    el.addEventListener('click', () => openInspect(r, count));
                }
                
                grid.appendChild(el);
            });

            // Update Progress
            document.getElementById('progress-text').textContent = `${unlockedCount}/${rarities.length}`;
            document.getElementById('progress-bar').style.width = `${(unlockedCount / rarities.length) * 100}%`;
            
            const highestName = highestId > 0 ? rarities.find(r => r.id === highestId).name : "None";
            const highestColor = highestId > 0 ? rarities.find(r => r.id === highestId).color : "var(--text-muted)";
            const hText = document.getElementById('highest-text');
            hText.textContent = highestName;
            hText.style.color = highestColor;
        }

        // Tooltip handlers
        const tooltip = document.getElementById('tooltip');
        function showTooltip(e, rarity, count) {
            tooltip.innerHTML = `<strong style="color:${rarity.color}">${rarity.name}</strong><br>Odds: 1 in ${formatNumber(rarity.odds)}<br>Owned: ${formatNumber(count)}<br>Value: +${formatNumber(rarity.val)} pts`;
            tooltip.style.opacity = 1;
            moveTooltip(e);
        }
        function moveTooltip(e) {
            tooltip.style.left = e.pageX + 15 + 'px';
            tooltip.style.top = e.pageY + 15 + 'px';
        }
        function hideTooltip() {
            tooltip.style.opacity = 0;
        }

        // --- Inspect Modal Logic ---
        const modal = document.getElementById('inspect-modal');
        const btnCloseModal = document.getElementById('btn-close-modal');

        function openInspect(rarity, count) {
            document.getElementById('inspect-image').src = `images/${getFilename(rarity.name)}.png`;
            document.getElementById('inspect-image').onerror = (e) => { e.target.src = getPlaceholderSVG(rarity.color, rarity.name[0]); };
            
            const nameEl = document.getElementById('inspect-name');
            nameEl.textContent = rarity.name;
            nameEl.style.color = rarity.color;
            nameEl.className = `efx-${rarity.effect}`; // Apply the visual effect glow
            
            document.getElementById('inspect-odds').textContent = `Odds: 1 in ${formatNumber(rarity.odds)}`;
            document.getElementById('inspect-owned').textContent = `Owned: ${formatNumber(count)}`;
            document.getElementById('inspect-value').textContent = `Value: +${formatNumber(rarity.val)} pts`;
            
            modal.classList.add('active');
            hideTooltip(); // Hide hover tooltip when modal opens
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        btnCloseModal.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal(); // Close if background clicked
        });

        // Helpers
        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : '255,255,255';
        }

        // --- Save / Load ---
        function saveData() {
            localStorage.setItem('absRngSave', JSON.stringify(state));
        }

        function loadData() {
            const saved = localStorage.getItem('absRngSave');
            if (saved) {
                try {
                    state = { ...state, ...JSON.parse(saved) };
                } catch(e) { console.error("Save load failed", e); }
            }
            
            // Generate default name if missing (runs on first load ever)
            if (!state.playerName) {
                const randomDigits = Math.floor(1000 + Math.random() * 9000); // 1000-9999
                state.playerName = `Guest_${randomDigits}`;
                saveData();
            }

            updateUI();
        }

        // --- Event Listeners ---
        document.getElementById('btn-roll').addEventListener('click', triggerRoll);

        document.getElementById('toggle-auto').addEventListener('change', (e) => {
            if (e.target.checked) {
                document.getElementById('btn-roll').disabled = true;
                triggerRoll(); // roll immediately
                autoRollInterval = setInterval(triggerRoll, 1000);
            } else {
                document.getElementById('btn-roll').disabled = false;
                clearInterval(autoRollInterval);
            }
        });

        document.getElementById('btn-upgrade').addEventListener('click', () => {
            const cost = getUpgradeCost();
            if (state.points >= cost) {
                state.points -= cost;
                state.luck *= 1.5; // Each upgrade adds 0.5x multiplier
                state.luckLevel += 1;
                saveData();
                updateUI();
                
                // Upgrade visual feedback
                const btn = document.getElementById('btn-upgrade');
                btn.textContent = "UPGRADED!";
                btn.style.background = "var(--accent)";
                setTimeout(() => {
                    btn.style.background = "";
                    updateUI(); // Reset text
                }, 500);
            }
        });

        // --- Settings Menu Listeners ---
        const settingsModal = document.getElementById('settings-modal');
        
        document.getElementById('btn-settings').addEventListener('click', () => {
            document.getElementById('input-name').value = state.playerName;
            document.getElementById('code-message').textContent = '';
            document.getElementById('input-code').value = '';
            
            // Reset the reset confirmation UI
            document.getElementById('btn-reset-progress').style.display = 'block';
            document.getElementById('reset-confirm-area').style.display = 'none';

            settingsModal.classList.add('active');
        });

        document.getElementById('btn-close-settings').addEventListener('click', () => {
            settingsModal.classList.remove('active');
        });

        // Change Name
        document.getElementById('btn-save-name').addEventListener('click', () => {
            const input = document.getElementById('input-name').value.trim();
            if (input.length > 0 && input.length <= 16) {
                state.playerName = input;
                saveData();
                updateUI();
                
                const btn = document.getElementById('btn-save-name');
                const origText = btn.textContent;
                btn.textContent = "Saved!";
                btn.style.background = "var(--accent)";
                setTimeout(() => {
                    btn.textContent = origText;
                    btn.style.background = "";
                }, 1000);
            }
        });

        // Redeem Code
        document.getElementById('btn-redeem').addEventListener('click', () => {
            const code = document.getElementById('input-code').value.trim().toUpperCase();
            const msgEl = document.getElementById('code-message');
            
            if (!code) return;

            if (state.redeemedCodes.includes(code)) {
                msgEl.textContent = "Code already redeemed!";
                msgEl.style.color = "#ff6b6b";
                return;
            }

            if (validCodes[code]) {
                const reward = validCodes[code];
                state.points += reward;
                state.redeemedCodes.push(code);
                saveData();
                updateUI();
                
                msgEl.textContent = `Success! +${formatNumber(reward)} points!`;
                msgEl.style.color = "#4CAF50";
            } else {
                msgEl.textContent = "Invalid code!";
                msgEl.style.color = "#ff6b6b";
            }
        });

        // Reset Progress logic
        document.getElementById('btn-reset-progress').addEventListener('click', () => {
            document.getElementById('btn-reset-progress').style.display = 'none';
            document.getElementById('reset-confirm-area').style.display = 'flex';
        });
        
        document.getElementById('btn-cancel-reset').addEventListener('click', () => {
            document.getElementById('btn-reset-progress').style.display = 'block';
            document.getElementById('reset-confirm-area').style.display = 'none';
        });

        document.getElementById('btn-confirm-reset').addEventListener('click', () => {
            const preservedName = state.playerName; // Preserve the name
            
            // Wipe everything back to default
            state = {
                inventory: {}, 
                rolls: 0,
                points: 0,
                luckLevel: 1,
                luck: 1,
                pity: 0,
                playerName: preservedName,
                redeemedCodes: []
            };
            
            saveData();
            location.reload(); // Reload cleanly resets everything visually
        });

        // Initialize
        loadData();

    </script>
</body>
</html>
